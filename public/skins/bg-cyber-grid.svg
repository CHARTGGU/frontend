<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="cg-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05010f"/>
      <stop offset="42%" stop-color="#1a0b3a"/>
      <stop offset="68%" stop-color="#5b1d6e"/>
      <stop offset="100%" stop-color="#0a0420"/>
    </linearGradient>
    <radialGradient id="cg-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2a8"/>
      <stop offset="45%" stop-color="#ff5fa2"/>
      <stop offset="100%" stop-color="#ff5fa2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cg-line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#19e8ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#19e8ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="cg-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="cg-scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="2" fill="#ffffff" opacity="0.03"/>
    </pattern>
  </defs>

  <rect width="1200" height="800" fill="url(#cg-sky)"/>

  <!-- 신스웨이브 태양 + 슬릿 -->
  <g filter="url(#cg-glow)">
    <circle cx="600" cy="330" r="150" fill="url(#cg-sun)"/>
    <g fill="#0a0420">
      <rect x="430" y="392" width="340" height="6"/>
      <rect x="430" y="408" width="340" height="9"/>
      <rect x="430" y="428" width="340" height="12"/>
      <rect x="430" y="452" width="340" height="16"/>
    </g>
  </g>

  <!-- 원경 별 -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="120" cy="70" r="1.6"/><circle cx="280" cy="120" r="1.1"/>
    <circle cx="980" cy="90" r="1.8"/><circle cx="1100" cy="160" r="1.2"/>
    <circle cx="760" cy="60" r="1.3"/><circle cx="180" cy="200" r="1.1"/>
    <circle cx="1040" cy="240" r="1.4"/><circle cx="60" cy="150" r="1.2"/>
  </g>

  <!-- 원근 그리드 (지평선 y=470) -->
  <g stroke="#ff2fa0" stroke-width="1.4" opacity="0.55">
    <line x1="600" y1="470" x2="-360" y2="800"/>
    <line x1="600" y1="470" x2="-40" y2="800"/>
    <line x1="600" y1="470" x2="220" y2="800"/>
    <line x1="600" y1="470" x2="420" y2="800"/>
    <line x1="600" y1="470" x2="600" y2="800"/>
    <line x1="600" y1="470" x2="780" y2="800"/>
    <line x1="600" y1="470" x2="980" y2="800"/>
    <line x1="600" y1="470" x2="1240" y2="800"/>
    <line x1="600" y1="470" x2="1560" y2="800"/>
  </g>
  <g stroke="url(#cg-line)" stroke-width="1.6" opacity="0.7">
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="592" x2="1200" y2="592"/>
    <line x1="0" y1="660" x2="1200" y2="660"/>
    <line x1="0" y1="748" x2="1200" y2="748"/>
  </g>

  <!-- 지평선 글로우 -->
  <line x1="0" y1="470" x2="1200" y2="470" stroke="#19e8ff" stroke-width="2.2" filter="url(#cg-glow)" opacity="0.9"/>

  <!-- 스캔라인 (CRT 느낌) -->
  <rect width="1200" height="800" fill="url(#cg-scan)"/>
</svg>
