<svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 0 120 80">
  <rect width="120" height="80" fill="#1a1d2e"/>
  <!-- 구름 채움 (선행스팬 A>B 구간 청록) -->
  <polygon points="10,55 40,35 70,30 100,38 110,45 110,62 70,58 40,60 10,68" fill="rgba(38,166,154,0.3)"/>
  <!-- 선행스팬 A (청록) -->
  <polyline points="10,55 40,35 70,30 100,38 110,45" fill="none" stroke="#26a69a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- 선행스팬 B (오렌지) -->
  <polyline points="10,68 40,60 70,58 100,55 110,62" fill="none" stroke="#ff9f43" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- 기준선 (파랑) -->
  <polyline points="10,48 30,44 55,42 80,46 110,50" fill="none" stroke="#2962ff" stroke-width="1.5"/>
  <!-- 전환선 (빨강) -->
  <polyline points="10,52 25,47 50,40 75,44 110,47" fill="none" stroke="#ef5350" stroke-width="1.2"/>
  <!-- 후행스팬 (보라, 점선) -->
  <polyline points="10,42 35,50 60,55 85,53 110,58" fill="none" stroke="#9c27b0" stroke-width="1" stroke-dasharray="2,3"/>
  <!-- ✈️ 돌파 마커 힌트 -->
  <text x="88" y="28" font-size="12" text-anchor="middle">✈️</text>
</svg>
