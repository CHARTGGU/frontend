<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="candy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe1ef"/>
      <stop offset="100%" stop-color="#fff3d6"/>
    </linearGradient>
    <pattern id="dots" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="9" fill="#ffb3c9" opacity="0.55"/>
      <circle cx="60" cy="60" r="6" fill="#ffd59e" opacity="0.6"/>
      <circle cx="60" cy="20" r="4" fill="#b5e0ff" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="1200" height="800" fill="url(#candy)"/>
  <rect width="1200" height="800" fill="url(#dots)"/>
</svg>
