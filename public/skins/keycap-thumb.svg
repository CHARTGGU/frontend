<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <!-- 배경 -->
  <rect width="120" height="80" fill="#1a1d2e" rx="4"/>

  <!-- 체인 -->
  <ellipse cx="60" cy="8" rx="5" ry="3.5" stroke="#b0b0b0" stroke-width="1.5" fill="none"/>
  <line x1="60" y1="11" x2="60" y2="15" stroke="#b0b0b0" stroke-width="1.5"/>

  <!-- 검정 베이스 -->
  <rect x="26" y="16" width="68" height="58" rx="8" fill="#1e1e1e"/>

  <!-- 키캡 4개 (2x2) -->
  <!-- 상승 (흰색, 빨간 화살표) -->
  <rect x="32" y="22" width="26" height="26" rx="5" fill="#f2ede4"/>
  <rect x="32" y="22" width="26" height="26" rx="5" fill="none" stroke="#cec5b2" stroke-width="1"/>
  <polygon points="45,27 52,35 38,35" fill="#e53935"/>
  <rect x="42" y="34" width="6" height="5" rx="1" fill="#e53935"/>

  <!-- 하락 (연파랑, 파란 화살표) -->
  <rect x="62" y="22" width="26" height="26" rx="5" fill="#e8eef8"/>
  <rect x="62" y="22" width="26" height="26" rx="5" fill="none" stroke="#c4cede" stroke-width="1"/>
  <polygon points="75,43 82,35 68,35" fill="#1565c0"/>
  <rect x="72" y="28" width="6" height="5" rx="1" fill="#1565c0"/>

  <!-- 상한가 (금색) -->
  <rect x="32" y="52" width="26" height="18" rx="5" fill="#fff9e0"/>
  <rect x="32" y="52" width="26" height="18" rx="5" fill="none" stroke="#e4c840" stroke-width="1"/>
  <text x="45" y="64" text-anchor="middle" font-size="7.5" font-weight="900" fill="#c62828" font-family="sans-serif">상한가</text>

  <!-- 코인 (금색) -->
  <rect x="62" y="52" width="26" height="18" rx="5" fill="#fff4cc"/>
  <rect x="62" y="52" width="26" height="18" rx="5" fill="none" stroke="#e8c838" stroke-width="1"/>
  <text x="75" y="64" text-anchor="middle" font-size="12" font-weight="900" fill="#b45309" font-family="serif">₿</text>
</svg>
